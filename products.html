      <h1>Plants for every corner and every schedule</h1>
      <p>
        Each plant below is rated by how much attention it wants, so you can shop by
        your real life instead of guesswork. Prices are in Bangladeshi Taka (৳) and
        include the pot, the soil, and a care card — there's nothing else to add at
        checkout, and cash on delivery is available across Dhaka.
      </p>
      <p>
        Sizes are the current potted height, give or take a leaf. Add a few to your
        cart and watch the counter in the header climb.
      </p>
